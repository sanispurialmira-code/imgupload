; .user.ini - Per-directory PHP configuration
; This file is loaded by PHP-FPM automatically

upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 60
max_input_time = 60
memory_limit = 256M
display_errors = Off
log_errors = On

; Allow URL functions (needed for proxy scripts)
allow_url_fopen = On

; GD library for image processing
; Ensure vercel-php build includes gd extension
